name: pipeline mdbc api
run-name: ${{ github.actor }} started the CI script

on: [push, pull_request]

jobs:
  Setup-app-environment:
    name: Setup environment for app test
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ">=3.14"

      - name: logging event status
        run: echo "${{ github.actor }} performed a ${{ github.event_name }} at ${{ github.repository }}"

      - name: installing uv
        run: pip install uv

      - name: installing dependencies
        run: uv sync --all-groups

      - name: formatting
        run: task format
  
      - name: testing app
        run: task test

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TOKEN_MINUTES_EXPIRE_TIME: ${{ secrets.TOKEN_MINUTES_EXPIRE_TIME }}
      TOKEN_ALGORITHM: ${{ secrets.TOKEN_ALGORITHM }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
